name: xatlas-ios
options:
  bundleIdPrefix: com.xatlas
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: false
packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: "1.2.0"
targets:
  xatlas:
    type: application
    platform: iOS
    sources:
      - path: xatlas-ios
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xatlas.ios
        DEVELOPMENT_TEAM: GK29QW288K
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "xatlas needs local network access to connect to your Mac"
        INFOPLIST_KEY_NSBonjourServices: "_xatlas._tcp"
        INFOPLIST_KEY_NSCameraUsageDescription: "xatlas uses the camera to scan the pairing QR code from your Mac"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: SwiftTerm
